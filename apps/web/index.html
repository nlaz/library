<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>The Library</title>
    <link rel="preload" href="/fonts/instrument-sans-vf.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ibm-plex-mono-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ibm-plex-mono-500.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <nav id="cols" role="group" title="Collections"></nav>
      <button id="chat-toggle" title="Ask the librarian">chat</button>
    </header>
    <main>
      <div id="home"></div>
      <div id="search" hidden>
        <div id="stats"></div>
        <div id="results"></div>
        <div id="more" hidden></div>
      </div>
    </main>
    <section id="reader" hidden>
      <div id="reader-top">
        <button id="reader-back" title="Back (Esc)">←</button>
        <div id="reader-title"></div>
        <div id="reader-pageno"></div>
        <button id="reader-meta" title="Document info">ⓘ</button>
      </div>
      <div id="reader-body">
        <div id="reader-scroll">
          <div id="reader-pages"></div>
        </div>
        <div id="reader-ticks"></div>
        <aside id="reader-drawer" hidden></aside>
      </div>
    </section>
    <div id="overlay" hidden>
      <aside id="viewer">
        <div id="viewer-top">
          <div id="viewer-label"></div>
          <div class="viewer-actions">
            <button id="viewer-read">Open in reader</button>
            <button id="viewer-close" title="Close (Esc)">✕</button>
          </div>
        </div>
        <div id="page-wrap">
          <img id="page-img" alt="" />
          <div id="page-hl"></div>
        </div>
      </aside>
    </div>
    <div id="dropzone" hidden>
      <div class="dz-inner">Drop PDFs to add them to the library</div>
    </div>
    <div id="search-pop" hidden>
      <input id="q" type="search" placeholder="Search the library…" autocomplete="off" />
      <div id="search-nav" hidden>
        <span id="search-count"></span>
        <button id="search-prev" title="Previous match (Shift+Enter)">↑</button>
        <button id="search-next" title="Next match (Enter)">↓</button>
      </div>
    </div>
    <aside id="chat" hidden aria-label="Librarian chat">
      <div id="chat-top">
        <span>librarian</span>
        <div class="chat-actions">
          <button id="chat-stop" title="Stop generating" hidden>stop</button>
          <button id="chat-clear" title="Clear conversation">clear</button>
          <button id="chat-close" title="Close (Esc)">✕</button>
        </div>
      </div>
      <div id="chat-log" aria-live="polite"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="ask the library…" autocomplete="off" />
      </form>
    </aside>
    <div id="toast" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
